workflows:
  sayartijo-android-build:
    name: Sayartijo Android Build (Debug)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        PACKAGE_NAME: "app.lovable.43155ac93bb547fea443458bc00775a6"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install -g @capacitor/cli
      - name: Build web app
        script: |
          npm run build
      - name: Add Android platform
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
