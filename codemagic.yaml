workflows:
  sayartijo-android-build:
    name: Sayartijo Android Build (Debug)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      vars:
        PACKAGE_NAME: "app.lovable.sayartijo43155ac93bb547fea443458bc00775a6"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Initialize Android platform if missing
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Copy web assets to Android
        script: |
          npx cap copy android
      - name: Sync Capacitor plugins
        script: |
          npx cap sync android
      - name: Build Android debug APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
